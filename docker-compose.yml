version: "3.9"
services:
  postgres:
    image: postgres:16
    container_name: apirest-postgres
    environment:
      POSTGRES_USER: apirest
      POSTGRES_PASSWORD: apirest123
      POSTGRES_DB: apirest
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: apirest-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
